name: Deploy Theme

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Ping healthchecks.io start
        run: curl -fsS --retry 3 "https://hc-ping.com/e9533dab-01a9-4167-8405-4dc19f970573/start"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ghostadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /usr/local/bin/ghost-theme-deploy.sh

      - name: Ping healthchecks.io success
        if: success()
        run: curl -fsS --retry 3 "https://hc-ping.com/e9533dab-01a9-4167-8405-4dc19f970573"

      - name: Ping healthchecks.io fail
        if: failure()
        run: curl -fsS --retry 3 "https://hc-ping.com/e9533dab-01a9-4167-8405-4dc19f970573/fail"
